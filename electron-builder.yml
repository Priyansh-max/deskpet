appId: com.deskpet.app
productName: DeskPet
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
# koffi ships a native .node binary that must live outside the asar archive.
asarUnpack:
  - '**/node_modules/koffi/**'
extraResources:
  - from: resources/tray.png
    to: tray.png
win:
  target:
    - target: nsis
      arch:
        - x64
  # Stable, unversioned name so the "latest release" download URL never changes.
  artifactName: ${productName}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: DeskPet
