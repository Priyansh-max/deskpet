appId: com.deskpet.app
productName: DeskPet
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: resources/tray.png
    to: tray.png
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: DeskPet
